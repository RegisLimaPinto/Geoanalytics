# =============================================================================
# GeoAnalytics - mineracaoanalytics.cloud
# =============================================================================

mineracaoanalytics.cloud, www.mineracaoanalytics.cloud {
    encode gzip zstd

    header {
        Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
        X-Frame-Options "SAMEORIGIN"
        X-Content-Type-Options "nosniff"
        Referrer-Policy "strict-origin-when-cross-origin"
        -Server
    }

    # API Backend (FastAPI)
    @api path /api/*
    handle @api {
        reverse_proxy 127.0.0.1:8000 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Proto {scheme}
        }
    }

    # GeoServer
    @geoserver path /geoserver/*
    handle @geoserver {
        reverse_proxy 127.0.0.1:8600 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Proto {scheme}
        }
    }

    # Frontend React (SPA)
    handle {
        reverse_proxy 127.0.0.1:3000 {
            header_up Host {host}
            header_up X-Real-IP {remote_host}
            header_up X-Forwarded-Proto {scheme}
        }
    }

    log {
        output file /var/log/caddy/geoanalytics.log
        format json
    }
}
